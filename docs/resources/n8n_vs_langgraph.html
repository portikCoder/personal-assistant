<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>n8n vs LangGraph paths</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      color: #1a1a1a;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; color: #e8e6de; }
    }
    h1 {
      font-size: 18px;
      font-weight: 500;
      margin: 0 0 4px 0;
      color: inherit;
    }
    p.sub {
      font-size: 13px;
      color: #6b6a64;
      margin: 0 0 24px 0;
    }
    @media (prefers-color-scheme: dark) {
      p.sub { color: #9c9a92; }
    }
    svg { display: block; width: 100%; max-width: 900px; margin: 0 auto; }

    /* color ramps — light */
    .c-gray rect, .c-gray circle, .c-gray ellipse { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray .th { fill: #444441; }
    .c-gray .ts { fill: #5F5E5A; }
    .c-purple rect, .c-purple circle, .c-purple ellipse { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .th { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }
    .c-teal rect, .c-teal circle, .c-teal ellipse { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal .th { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }
    .c-amber rect, .c-amber circle, .c-amber ellipse { fill: #FAEEDA; stroke: #854F0B; }
    .c-amber .th { fill: #633806; }
    .c-amber .ts { fill: #854F0B; }
    .c-blue rect, .c-blue circle, .c-blue ellipse { fill: #E6F1FB; stroke: #185FA5; }
    .c-blue .th { fill: #0C447C; }
    .c-blue .ts { fill: #185FA5; }
    .c-coral rect, .c-coral circle, .c-coral ellipse { fill: #FAECE7; stroke: #993C1D; }
    .c-coral .th { fill: #712B13; }
    .c-coral .ts { fill: #993C1D; }
    .c-green rect, .c-green circle, .c-green ellipse { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green .th { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }

    /* dark mode overrides */
    @media (prefers-color-scheme: dark) {
      .c-gray rect, .c-gray circle, .c-gray ellipse { fill: #444441; stroke: #B4B2A9; }
      .c-gray .th { fill: #D3D1C7; } .c-gray .ts { fill: #B4B2A9; }
      .c-purple rect, .c-purple circle, .c-purple ellipse { fill: #3C3489; stroke: #AFA9EC; }
      .c-purple .th { fill: #CECBF6; } .c-purple .ts { fill: #AFA9EC; }
      .c-teal rect, .c-teal circle, .c-teal ellipse { fill: #085041; stroke: #5DCAA5; }
      .c-teal .th { fill: #9FE1CB; } .c-teal .ts { fill: #5DCAA5; }
      .c-amber rect, .c-amber circle, .c-amber ellipse { fill: #633806; stroke: #EF9F27; }
      .c-amber .th { fill: #FAC775; } .c-amber .ts { fill: #EF9F27; }
      .c-blue rect, .c-blue circle, .c-blue ellipse { fill: #0C447C; stroke: #85B7EB; }
      .c-blue .th { fill: #B5D4F4; } .c-blue .ts { fill: #85B7EB; }
      .c-coral rect, .c-coral circle, .c-coral ellipse { fill: #712B13; stroke: #F0997B; }
      .c-coral .th { fill: #F5C4B3; } .c-coral .ts { fill: #F0997B; }
      .c-green rect, .c-green circle, .c-green ellipse { fill: #27500A; stroke: #97C459; }
      .c-green .th { fill: #C0DD97; } .c-green .ts { fill: #97C459; }
    }

    .th { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; font-weight: 500; }
    .ts { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 12px; font-weight: 400; }
    .arr { stroke: #888780; stroke-width: 1.5px; fill: none; }
    .divider { stroke: #d3d1c7; stroke-width: 1px; stroke-dasharray: 4 4; }
    @media (prefers-color-scheme: dark) {
      .arr { stroke: #888780; }
      .divider { stroke: #444441; }
    }
  </style>
</head>
<body>
  <h1>n8n vs LangGraph — side by side</h1>
  <p class="sub">Same layers, different substance. Click to explore each block.</p>

  <svg viewBox="0 0 680 860" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- Column headers -->
    <g class="c-gray">
      <rect x="40" y="30" width="270" height="36" rx="8" stroke-width="0.5"/>
      <text class="th" x="175" y="48" text-anchor="middle" dominant-baseline="central">n8n path</text>
    </g>
    <g class="c-gray">
      <rect x="370" y="30" width="270" height="36" rx="8" stroke-width="0.5"/>
      <text class="th" x="505" y="48" text-anchor="middle" dominant-baseline="central">LangGraph path</text>
    </g>

    <!-- Divider -->
    <line x1="340" y1="20" x2="340" y2="840" class="divider"/>

    <!-- ROW 1: Interface -->
    <g class="c-gray">
      <rect x="50" y="90" width="250" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="175" y="111" text-anchor="middle" dominant-baseline="central">Telegram</text>
      <text class="ts" x="175" y="131" text-anchor="middle" dominant-baseline="central">n8n Telegram trigger node</text>
    </g>
    <g class="c-gray">
      <rect x="380" y="90" width="250" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="505" y="111" text-anchor="middle" dominant-baseline="central">Telegram</text>
      <text class="ts" x="505" y="131" text-anchor="middle" dominant-baseline="central">python-telegram-bot webhook</text>
    </g>

    <line x1="175" y1="146" x2="175" y2="176" class="arr" marker-end="url(#arrow)"/>
    <line x1="505" y1="146" x2="505" y2="176" class="arr" marker-end="url(#arrow)"/>

    <!-- ROW 2: Gateway -->
    <g class="c-purple">
      <rect x="50" y="176" width="250" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="175" y="197" text-anchor="middle" dominant-baseline="central">Gateway</text>
      <text class="ts" x="175" y="217" text-anchor="middle" dominant-baseline="central">n8n webhook node built-in</text>
    </g>
    <g class="c-purple">
      <rect x="380" y="176" width="250" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="505" y="197" text-anchor="middle" dominant-baseline="central">Gateway</text>
      <text class="ts" x="505" y="217" text-anchor="middle" dominant-baseline="central">FastAPI · auth · session ID</text>
    </g>

    <line x1="175" y1="232" x2="175" y2="262" class="arr" marker-end="url(#arrow)"/>
    <line x1="505" y1="232" x2="505" y2="262" class="arr" marker-end="url(#arrow)"/>

    <!-- ROW 3: Orchestrator -->
    <g class="c-teal">
      <rect x="50" y="262" width="250" height="80" rx="8" stroke-width="1"/>
      <text class="th" x="175" y="286" text-anchor="middle" dominant-baseline="central">Orchestrator</text>
      <text class="ts" x="175" y="308" text-anchor="middle" dominant-baseline="central">AI Agent node + sub-workflows</text>
      <text class="ts" x="175" y="326" text-anchor="middle" dominant-baseline="central">Visual canvas, fixed at design time</text>
    </g>
    <g class="c-teal">
      <rect x="380" y="262" width="250" height="80" rx="8" stroke-width="1"/>
      <text class="th" x="505" y="286" text-anchor="middle" dominant-baseline="central">Orchestrator</text>
      <text class="ts" x="505" y="308" text-anchor="middle" dominant-baseline="central">StateGraph · nodes · edges</text>
      <text class="ts" x="505" y="326" text-anchor="middle" dominant-baseline="central">Runtime decisions, code-defined</text>
    </g>

    <line x1="175" y1="342" x2="175" y2="372" class="arr" marker-end="url(#arrow)"/>
    <line x1="505" y1="342" x2="505" y2="372" class="arr" marker-end="url(#arrow)"/>

    <!-- ROW 4: Memory / State -->
    <g class="c-amber">
      <rect x="50" y="372" width="250" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="175" y="393" text-anchor="middle" dominant-baseline="central">Memory / state</text>
      <text class="ts" x="175" y="413" text-anchor="middle" dominant-baseline="central">Window buffer · Postgres node</text>
    </g>
    <g class="c-amber">
      <rect x="380" y="372" width="250" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="505" y="393" text-anchor="middle" dominant-baseline="central">Memory / state</text>
      <text class="ts" x="505" y="413" text-anchor="middle" dominant-baseline="central">TypedDict state · SQLite checkpointer</text>
    </g>

    <!-- SOUL -->
    <g class="c-amber">
      <rect x="50" y="440" width="250" height="44" rx="8" stroke-width="0.5"/>
      <text class="th" x="175" y="456" text-anchor="middle" dominant-baseline="central">SOUL / identity</text>
      <text class="ts" x="175" y="473" text-anchor="middle" dominant-baseline="central">System prompt in agent node</text>
    </g>
    <g class="c-amber">
      <rect x="380" y="440" width="250" height="44" rx="8" stroke-width="0.5"/>
      <text class="th" x="505" y="456" text-anchor="middle" dominant-baseline="central">SOUL / identity</text>
      <text class="ts" x="505" y="473" text-anchor="middle" dominant-baseline="central">SOUL.md injected at planner node</text>
    </g>

    <line x1="175" y1="484" x2="175" y2="514" class="arr" marker-end="url(#arrow)"/>
    <line x1="505" y1="484" x2="505" y2="514" class="arr" marker-end="url(#arrow)"/>

    <!-- ROW 5: Sub-agents -->
    <g class="c-blue">
      <rect x="50" y="514" width="250" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="175" y="535" text-anchor="middle" dominant-baseline="central">Sub-agents</text>
      <text class="ts" x="175" y="555" text-anchor="middle" dominant-baseline="central">Separate AI Agent sub-workflows</text>
    </g>
    <g class="c-blue">
      <rect x="380" y="514" width="250" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="505" y="535" text-anchor="middle" dominant-baseline="central">Sub-agents</text>
      <text class="ts" x="505" y="555" text-anchor="middle" dominant-baseline="central">Graph nodes or compiled subgraphs</text>
    </g>

    <line x1="175" y1="570" x2="175" y2="600" class="arr" marker-end="url(#arrow)"/>
    <line x1="505" y1="570" x2="505" y2="600" class="arr" marker-end="url(#arrow)"/>

    <!-- ROW 6: Tools -->
    <g class="c-coral">
      <rect x="50" y="600" width="250" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="175" y="621" text-anchor="middle" dominant-baseline="central">Tools</text>
      <text class="ts" x="175" y="641" text-anchor="middle" dominant-baseline="central">422+ native nodes · MCP client</text>
    </g>
    <g class="c-coral">
      <rect x="380" y="600" width="250" height="56" rx="8" stroke-width="0.5"/>
      <text class="th" x="505" y="621" text-anchor="middle" dominant-baseline="central">Tools</text>
      <text class="ts" x="505" y="641" text-anchor="middle" dominant-baseline="central">@tool functions · MCP · any API</text>
    </g>

    <!-- Tradeoff pills -->
    <text class="ts" x="175" y="684" text-anchor="middle" style="fill:#6b6a64">dev speed</text>
    <g class="c-green">
      <rect x="80" y="692" width="190" height="28" rx="14" stroke-width="0.5"/>
      <text class="th" x="175" y="706" text-anchor="middle" dominant-baseline="central">hours to working system</text>
    </g>

    <text class="ts" x="505" y="684" text-anchor="middle" style="fill:#6b6a64">dev speed</text>
    <g class="c-amber">
      <rect x="410" y="692" width="190" height="28" rx="14" stroke-width="0.5"/>
      <text class="th" x="505" y="706" text-anchor="middle" dominant-baseline="central">days to working system</text>
    </g>

    <text class="ts" x="175" y="742" text-anchor="middle" style="fill:#6b6a64">UX ceiling</text>
    <g class="c-amber">
      <rect x="80" y="750" width="190" height="28" rx="14" stroke-width="0.5"/>
      <text class="th" x="175" y="764" text-anchor="middle" dominant-baseline="central">bounded by n8n runtime</text>
    </g>

    <text class="ts" x="505" y="742" text-anchor="middle" style="fill:#6b6a64">UX ceiling</text>
    <g class="c-green">
      <rect x="410" y="750" width="190" height="28" rx="14" stroke-width="0.5"/>
      <text class="th" x="505" y="764" text-anchor="middle" dominant-baseline="central">unlimited — it is your code</text>
    </g>

    <text class="ts" x="175" y="808" text-anchor="middle" style="fill:#6b6a64">graph control</text>
    <g class="c-amber">
      <rect x="80" y="816" width="190" height="28" rx="14" stroke-width="0.5"/>
      <text class="th" x="175" y="830" text-anchor="middle" dominant-baseline="central">visual, fixed at design time</text>
    </g>

    <text class="ts" x="505" y="808" text-anchor="middle" style="fill:#6b6a64">graph control</text>
    <g class="c-green">
      <rect x="410" y="816" width="190" height="28" rx="14" stroke-width="0.5"/>
      <text class="th" x="505" y="830" text-anchor="middle" dominant-baseline="central">runtime, fully dynamic</text>
    </g>
  </svg>
</body>
</html>
